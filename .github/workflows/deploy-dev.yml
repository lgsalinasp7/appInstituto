name: Deploy develop

on:
  push:
    branches:
      - develop

jobs:
  migrate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run migrations en develop
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}

      - name: Seed develop
        run: npx prisma db seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}

      - name: Trigger deploy en Vercel dev
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK_DEV }}