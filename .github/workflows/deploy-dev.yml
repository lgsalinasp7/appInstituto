name: Deploy develop

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Type check (bloqueante)
        run: npx tsc --noEmit

      - name: Tests (bloqueante)
        run: npm run test:run

      - name: Lint (bloqueante)
        run: npm run lint

  migrate-and-deploy:
    needs: quality-gates
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Prisma exige DATABASE_URL y DIRECT_URL no vacíos. Usa DIRECT_DATABASE_URL_DEV
      # (recomendado: URL sin pooler para migraciones) o, si no existe, DATABASE_URL_DEV.
      # Neon suele suspender el compute: el primer intento puede dar P1001; reintentamos con espera.
      - name: Run migrations en develop
        run: |
          set -e
          DB="${DIRECT_DATABASE_URL_DEV}"
          if [ -z "$DB" ]; then DB="${DATABASE_URL_DEV}"; fi
          if [ -z "$DB" ]; then
            echo "::error::Configura el secreto del repo: DIRECT_DATABASE_URL_DEV o DATABASE_URL_DEV (URL PostgreSQL dev)."
            exit 1
          fi
          export DATABASE_URL="$DB"
          export DIRECT_URL="$DB"
          max=5
          i=1
          while [ "$i" -le "$max" ]; do
            if npx prisma migrate deploy; then
              echo "migrate deploy OK (intento $i)"
              exit 0
            fi
            if [ "$i" -eq "$max" ]; then
              echo "::error::migrate deploy falló tras $max intentos. Revisa Neon (rama activa, URL en secretos) y que la cadena incluya ?sslmode=require"
              exit 1
            fi
            echo "Intento $i falló (p. ej. P1001 compute dormido en Neon). Esperando 20s…"
            sleep 20
            i=$((i + 1))
          done
        env:
          DIRECT_DATABASE_URL_DEV: ${{ secrets.DIRECT_DATABASE_URL_DEV }}
          DATABASE_URL_DEV: ${{ secrets.DATABASE_URL_DEV }}
          MIGRATE_ADVISORY_LOCK_TIMEOUT: "30000"

      # Tablas Kaled fuera de migraciones: aplicar en DB antes del build de Vercel
      - name: Ensure Kaled tables (develop)
        run: |
          set -e
          DB="${DIRECT_DATABASE_URL_DEV}"
          if [ -z "$DB" ]; then DB="${DATABASE_URL_DEV}"; fi
          if [ -z "$DB" ]; then
            echo "::error::Mismo secreto que migraciones: DIRECT_DATABASE_URL_DEV o DATABASE_URL_DEV"
            exit 1
          fi
          export DATABASE_URL="$DB"
          npx tsx prisma/ensure-kaled-tables.ts
        env:
          DIRECT_DATABASE_URL_DEV: ${{ secrets.DIRECT_DATABASE_URL_DEV }}
          DATABASE_URL_DEV: ${{ secrets.DATABASE_URL_DEV }}

      - name: Trigger deploy en Vercel dev
        run: |
          set -e
          HOOK="${{ secrets.VERCEL_DEPLOY_HOOK_DEV }}"
          if [ -z "$HOOK" ]; then
            echo "::error::Falta el secreto VERCEL_DEPLOY_HOOK_DEV en GitHub (Settings → Secrets → Actions)."
            exit 1
          fi
          resp=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "$HOOK")
          if [ "$resp" = "200" ] || [ "$resp" = "201" ]; then
            echo "Deploy disparado OK (HTTP $resp)"
            exit 0
          fi
          echo "::error::Deploy hook falló: HTTP $resp"
          if [ "$resp" = "404" ]; then
            echo "::notice::404 = la URL del hook ya no existe. En Vercel: proyecto **app-instituto-dev** (o el de develop) → Settings → Git → Deploy Hooks → crear hook (rama develop) → copiar URL → actualizar secreto VERCEL_DEPLOY_HOOK_DEV."
          fi
          exit 1
