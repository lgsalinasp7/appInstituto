name: Deploy develop

on:
  push:
    branches:
      - develop

jobs:
  migrate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run migrations en develop
        run: npx prisma migrate deploy
        env:
          # Schema requiere DATABASE_URL; migrate usa DIRECT_URL (evita P1002 advisory lock)
          DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL_DEV }}
          DIRECT_URL: ${{ secrets.DIRECT_DATABASE_URL_DEV }}
          MIGRATE_ADVISORY_LOCK_TIMEOUT: "30000"

      - name: Trigger deploy en Vercel dev
        run: |
          resp=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_DEV }}")
          [ "$resp" = "200" ] || [ "$resp" = "201" ] || (echo "Deploy hook failed: HTTP $resp" && exit 1)
