name: Backup Neon a S3

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC = 00:00 Colombia
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Dump Neon database
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          pg_dump "${{ secrets.DATABASE_URL }}" --no-owner --no-acl -F c | gzip > backup.dump.gz

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload to S3
        run: |
          DATE=$(date +%Y-%m-%d)
          aws s3 cp backup.dump.gz "s3://${{ vars.AWS_S3_BUCKET }}/backups/neon-$DATE.dump.gz"
