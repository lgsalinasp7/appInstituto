name: Cron - Process Subscriptions

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger process-subscriptions
        run: |
          resp=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://www.kaledsoft.tech/api/cron/process-subscriptions")
          [ "$resp" = "200" ] || (echo "Failed: $resp" && exit 1)
