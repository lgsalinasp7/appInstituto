name: Deploy producción

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Type check (bloqueante)
        run: npx tsc --noEmit

      - name: Tests (bloqueante)
        run: npm run test:run

      - name: Lint (informacional)
        run: npm run lint
        continue-on-error: true

  migrate-and-deploy:
    needs: quality-gates
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Neon puede estar suspendido: P1001 en el primer intento; reintentamos.
      - name: Run migrations en producción
        run: |
          set -e
          DB="${DIRECT_DATABASE_URL_PROD}"
          if [ -z "$DB" ]; then DB="${DATABASE_URL_PROD}"; fi
          if [ -z "$DB" ]; then
            echo "::error::Configura DIRECT_DATABASE_URL_PROD o DATABASE_URL_PROD (URL PostgreSQL prod)."
            exit 1
          fi
          export DATABASE_URL="$DB"
          export DIRECT_URL="$DB"
          max=5
          i=1
          while [ "$i" -le "$max" ]; do
            if npx prisma migrate deploy; then
              echo "migrate deploy OK (intento $i)"
              exit 0
            fi
            if [ "$i" -eq "$max" ]; then
              echo "::error::migrate deploy falló tras $max intentos. Revisa Neon y ?sslmode=require en el secreto."
              exit 1
            fi
            echo "Intento $i falló. Esperando 20s (Neon cold start)…"
            sleep 20
            i=$((i + 1))
          done
        env:
          DIRECT_DATABASE_URL_PROD: ${{ secrets.DIRECT_DATABASE_URL_PROD }}
          DATABASE_URL_PROD: ${{ secrets.DATABASE_URL_PROD }}
          MIGRATE_ADVISORY_LOCK_TIMEOUT: "30000"

      - name: Ensure Kaled tables (producción)
        run: |
          set -e
          DB="${DIRECT_DATABASE_URL_PROD}"
          if [ -z "$DB" ]; then DB="${DATABASE_URL_PROD}"; fi
          if [ -z "$DB" ]; then exit 1; fi
          export DATABASE_URL="$DB"
          npx tsx prisma/ensure-kaled-tables.ts
        env:
          DIRECT_DATABASE_URL_PROD: ${{ secrets.DIRECT_DATABASE_URL_PROD }}
          DATABASE_URL_PROD: ${{ secrets.DATABASE_URL_PROD }}

      - name: Trigger deploy en Vercel prod
        run: |
          set -e
          HOOK="${{ secrets.VERCEL_DEPLOY_HOOK_PROD }}"
          if [ -z "$HOOK" ]; then
            echo "::error::Falta VERCEL_DEPLOY_HOOK_PROD en Secrets → Actions."
            exit 1
          fi
          resp=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "$HOOK")
          if [ "$resp" = "200" ] || [ "$resp" = "201" ]; then
            echo "Deploy prod OK (HTTP $resp)"
            exit 0
          fi
          echo "::error::Deploy hook prod falló: HTTP $resp"
          if [ "$resp" = "404" ]; then
            echo "::notice::404: crea un Deploy Hook en el proyecto de producción (rama main) y actualiza VERCEL_DEPLOY_HOOK_PROD."
          fi
          exit 1
