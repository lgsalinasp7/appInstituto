# Crons vía GitHub Actions → Vercel
# Dispara los endpoints de cron en Vercel (evita límites de Vercel Hobby)
name: Cron Jobs Vercel

on:
  schedule:
    - cron: '0 5 * * *'   # kaled-daily - 05:00 UTC
    - cron: '0 9 * * *'   # notifications - 09:00 UTC
    - cron: '0 10 * * *'  # process-kaled-emails - 10:00 UTC
    - cron: '0 0 * * *'   # process-subscriptions - medianoche UTC
  workflow_dispatch:
    inputs:
      cron:
        description: 'Cron a ejecutar (kaled-daily, notifications, process-kaled-emails, process-subscriptions, all)'
        required: true
        default: 'all'

jobs:
  trigger-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger kaled-daily
        if: github.event.inputs.cron == 'kaled-daily' || github.event.inputs.cron == 'all' || github.event_name == 'schedule'
        run: |
          resp=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://www.kaledsoft.tech/api/cron/kaled-daily")
          [ "$resp" = "200" ] || (echo "kaled-daily failed: $resp" && exit 1)

      - name: Trigger notifications
        if: github.event.inputs.cron == 'notifications' || github.event.inputs.cron == 'all' || github.event_name == 'schedule'
        run: |
          resp=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://www.kaledsoft.tech/api/cron/notifications")
          [ "$resp" = "200" ] || (echo "notifications failed: $resp" && exit 1)

      - name: Trigger process-kaled-emails
        if: github.event.inputs.cron == 'process-kaled-emails' || github.event.inputs.cron == 'all' || github.event_name == 'schedule'
        run: |
          resp=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://www.kaledsoft.tech/api/cron/process-kaled-emails")
          [ "$resp" = "200" ] || (echo "process-kaled-emails failed: $resp" && exit 1)

      - name: Trigger process-subscriptions
        if: github.event.inputs.cron == 'process-subscriptions' || github.event.inputs.cron == 'all' || github.event_name == 'schedule'
        run: |
          resp=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://www.kaledsoft.tech/api/cron/process-subscriptions")
          [ "$resp" = "200" ] || (echo "process-subscriptions failed: $resp" && exit 1)
